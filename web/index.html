<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Identidad ────────────────────────────────────────────────────── -->
  <title>Nexora — Agenda TI</title>
  <meta name="description" content="Sistema de gestión de agenda y tareas para el equipo de TI." />
  <meta name="application-name" content="Nexora" />
  <meta name="theme-color" content="#1e40af" />

  <!-- ── Favicon ──────────────────────────────────────────────────────── -->
  <!--
      Coloca estos archivos en /public/:
        favicon.ico          (32×32, fallback universal)
        favicon-16.png       (16×16)
        favicon-32.png       (32×32)
        apple-touch-icon.png (180×180, iOS)
        favicon.svg          (vectorial, navegadores modernos)
    -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- ── Open Graph (compartir en Slack, Teams, etc.) ─────────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nexora — Agenda TI" />
  <meta property="og:description" content="Sistema de gestión de agenda y tareas para el equipo de TI." />
  <meta property="og:image" content="/og-image.png" />
  <!-- Cambia la URL base cuando tengas dominio de producción: -->
  <!-- <meta property="og:url" content="https://nexora.tuempresa.com" /> -->

  <!-- ── Robots (app interna — no indexar) ────────────────────────────── -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- ── Google Fonts — optimizado para no bloquear render ────────────── -->
  <!--
      Estrategia:
        1. preconnect temprano para resolver DNS+TLS antes de que llegue al link de CSS.
        2. El link de CSS usa media="print" onload trick para carga no bloqueante.
        3. <noscript> como fallback para navegadores sin JS.
    -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
